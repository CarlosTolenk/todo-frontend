<mat-card class="login-card">
  <mat-card-header>
    <mat-card-title>Iniciar sesión</mat-card-title>
    <mat-card-subtitle>
      Ingresa tu correo para cargar tus tareas o crear tu usuario.
    </mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="form" class="login-form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input
          matInput
          type="email"
          formControlName="email"
          autocomplete="email"
          inputmode="email"
          aria-describedby="login-email-error"
        />
        @if (emailErrorMessage) {
          <mat-error id="login-email-error">{{ emailErrorMessage }}</mat-error>
        }
      </mat-form-field>

      @if (errorMessage) {
        <p class="login-form__error" role="alert">{{ errorMessage }}</p>
      }

      <button mat-flat-button color="primary" type="submit" [disabled]="loading">
        @if (loading) {
          <mat-spinner diameter="20" />
        }
        <span>{{ loading ? 'Procesando...' : 'Continuar' }}</span>
      </button>
    </form>
  </mat-card-content>
</mat-card>
